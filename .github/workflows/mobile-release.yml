name: mobile-release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-production-release
  cancel-in-progress: false

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: mobile-production
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          cache: true
      - name: Install Android signing material
        working-directory: mobile
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          {
            printf 'storeFile=upload-keystore.jks\n'
            printf 'storePassword=%s\n' "$STORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > android/key.properties
      - run: flutter pub get
        working-directory: mobile
      - name: Build signed Android App Bundle
        working-directory: mobile
        run: >-
          flutter build appbundle --release
          --dart-define=PARKSHIELD_API_BASE_URL=${{ vars.API_BASE_URL }}
          --dart-define=PARKSHIELD_MAP_TILE_URL=${{ vars.MAP_TILE_URL }}
          --dart-define=PARKSHIELD_PRODUCT_ANALYTICS_ENABLED=${{ vars.PRODUCT_ANALYTICS_ENABLED }}
      - uses: actions/upload-artifact@v7
        with:
          name: parkshield-android-${{ github.sha }}
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

  ios:
    runs-on: macos-latest
    timeout-minutes: 45
    environment: mobile-production
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          cache: true
      - name: Install Apple signing material
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          test -n "$CERTIFICATE_BASE64"
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/parkshield.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/parkshield-signing.keychain-db"
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          printf '%s' "$PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
      - run: flutter pub get
        working-directory: mobile
      - name: Prepare release Flutter assets
        working-directory: mobile
        run: >-
          flutter build ios --release --no-codesign
          --dart-define=PARKSHIELD_API_BASE_URL=${{ vars.API_BASE_URL }}
          --dart-define=PARKSHIELD_MAP_TILE_URL=${{ vars.MAP_TILE_URL }}
          --dart-define=PARKSHIELD_PRODUCT_ANALYTICS_ENABLED=${{ vars.PRODUCT_ANALYTICS_ENABLED }}
      - name: Archive signed application
        working-directory: mobile
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ParkShield.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            CODE_SIGN_IDENTITY="Apple Distribution"
      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          sed \
            -e "s/REPLACE_TEAM_ID/$APPLE_TEAM_ID/g" \
            -e "s/REPLACE_PROFILE_UUID/$PROFILE_UUID/g" \
            mobile/ios/ExportOptions.plist > "$RUNNER_TEMP/ExportOptions.plist"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ParkShield.xcarchive" \
            -exportPath "$RUNNER_TEMP/ParkShieldExport" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
      - uses: actions/upload-artifact@v7
        with:
          name: parkshield-ios-${{ github.sha }}
          path: ${{ runner.temp }}/ParkShieldExport/*.ipa
          if-no-files-found: error
          retention-days: 30
      - name: Remove ephemeral signing keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true
