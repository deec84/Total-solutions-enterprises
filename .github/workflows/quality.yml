name: quality
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository files and secret exclusions
        run: scripts/check-repository-readiness.sh
      - name: Verify localization catalogs and native metadata
        run: python3 scripts/check-mobile-localizations.py
      - name: Verify observability, privacy-dimension, and SLO contracts
        run: python3 scripts/check-observability-contracts.py

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: parkshield_test
          POSTGRES_USER: parkshield
          POSTGRES_PASSWORD: integration-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parkshield -d parkshield_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      PARKSHIELD_ENVIRONMENT: test
      PARKSHIELD_DATABASE_URL: postgresql+asyncpg://parkshield:integration-only-password@localhost:5432/parkshield_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e '.[dev]'
        working-directory: backend
      - run: ruff check .
        working-directory: backend
      - run: mypy app
        working-directory: backend
      - name: Static application security analysis
        run: bandit -r app -ll
        working-directory: backend
      - name: Dependency vulnerability audit
        run: pip-audit
        working-directory: backend
      - run: alembic upgrade head
        working-directory: backend
      - run: alembic downgrade base && alembic upgrade head
        working-directory: backend
      - run: pytest tests integration_tests --cov-report=xml
        working-directory: backend
      - uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml
      - name: Backup and restore drill
        env:
          PGPASSWORD: integration-only-password
        run: |
          pg_dump -h localhost -U parkshield -d parkshield_test -Fc -f /tmp/parkshield.dump
          createdb -h localhost -U parkshield parkshield_restore
          pg_restore -h localhost -U parkshield -d parkshield_restore --no-owner /tmp/parkshield.dump
          psql -h localhost -U parkshield -d parkshield_restore -c "SELECT count(*) FROM alembic_version"

  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          cache: true
      - run: flutter pub get
        working-directory: mobile
      - name: Verify generated localizations are current
        run: flutter gen-l10n && git diff --exit-code -- lib/l10n/generated
        working-directory: mobile
      - run: dart format --output=none --set-exit-if-changed lib test
        working-directory: mobile
      - run: flutter analyze --fatal-infos
        working-directory: mobile
      - run: flutter test --coverage
        working-directory: mobile
      - name: Enforce Flutter line coverage (75%)
        run: scripts/check-flutter-coverage.sh mobile/coverage/lcov.info 75
      - uses: actions/upload-artifact@v7
        with:
          name: flutter-coverage
          path: mobile/coverage/lcov.info
      - run: flutter build apk --debug
        working-directory: mobile

  ios-build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          cache: true
      - run: flutter pub get
        working-directory: mobile
      - run: flutter build ios --debug --no-codesign
        working-directory: mobile

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: parkshield-api:ci

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Prepare placeholder-only local configuration
        run: cp .env.example .env
      - name: Validate resolved Compose configuration
        run: docker compose config --quiet
      - name: Start migrated API and PostGIS stack
        run: docker compose up --build --detach
      - name: Wait for API readiness
        run: |
          for attempt in $(seq 1 45); do
            if curl --fail --silent http://127.0.0.1:8000/api/v1/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Verify PostGIS and migration head
        run: scripts/verify-local-stack.sh
      - name: Show stack logs after failure
        if: failure()
        run: docker compose logs --no-color
      - name: Remove ephemeral CI stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
