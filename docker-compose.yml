name: parkshield-ai

x-api-base: &api-base
  image: parkshield-api:local
  build:
    context: ./backend
    target: runtime
  env_file:
    - .env
  init: true
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=64m
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: ${PARKSHIELD_POSTGRES_DB:-parkshield}
      POSTGRES_USER: ${PARKSHIELD_POSTGRES_USER:-parkshield}
      POSTGRES_PASSWORD: ${PARKSHIELD_POSTGRES_PASSWORD:?Set PARKSHIELD_POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    ports:
      - "127.0.0.1:${PARKSHIELD_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  migrate:
    <<: *api-base
    command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *api-base
    command:
      - uvicorn
      - app.main:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --no-access-log
    ports:
      - "127.0.0.1:${PARKSHIELD_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
